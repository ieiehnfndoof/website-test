<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kraken AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#1A1A2E',
                        primary: '#007BFF',
                        secondary: '#2A2A4A',
                        success: '#5CB85C',
                        danger: '#FF6347',
                        light: '#E0E0E0',
                        hint: '#87CEFA'
                    },
                    fontFamily: {
                        'roboto': ['Roboto', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .shadow-glow {
                box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
            }
            .shadow-glow-strong {
                box-shadow: 0 0 25px rgba(0, 191, 255, 0.6);
            }
            .shake {
                animation: shake 0.5s ease-in-out;
            }
            .fade-in {
                animation: fadeIn 0.8s ease-out forwards;
                opacity: 0;
            }
            @keyframes shake {
                0% { transform: translateX(0); }
                20% { transform: translateX(-10px); }
                40% { transform: translateX(10px); }
                60% { transform: translateX(-10px); }
                80% { transform: translateX(10px); }
                100% { transform: translateX(0); }
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-dark text-light font-roboto min-h-screen overflow-x-hidden">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-[#1e2533] to-dark">
        <h1 id="loginTitle" class="text-[clamp(2rem,8vw,3.5rem)] font-black text-primary mb-10 tracking-wider text-center shadow-glow-strong fade-in" style="animation-delay: 0.2s;">
            LOGIN SYSTEM
        </h1>

        <input 
            id="accessKey" 
            type="password" 
            placeholder="Your access key..." 
            class="w-[clamp(280px,85%,400px)] py-4 px-6 rounded-full bg-black/30 border-2 border-primary text-light text-lg outline-none shadow-glow transition-all duration-300 focus:border-hint focus:shadow-lg fade-in"
            style="animation-delay: 0.4s;"
        >

        <button 
            id="loginBtn" 
            class="mt-6 py-3 px-8 rounded-full bg-primary text-white font-bold text-lg shadow-glow hover:bg-primary/90 active:scale-95 transition-all duration-200 fade-in"
            style="animation-delay: 0.6s;"
        >
            ACTIVATE KEY 🔑
        </button>

        <div id="statusMsg" class="mt-6 text-lg font-bold"></div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chatScreen" class="hidden min-h-screen flex flex-col">
        <!-- HEADER -->
        <div class="bg-secondary p-4 flex items-center gap-3 shadow-md">
            <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xl">K</div>
            <div>
                <h2 class="text-xl font-bold">Kraken AI</h2>
                <p class="text-sm text-success flex items-center gap-1">
                    <span class="inline-block w-2 h-2 rounded-full bg-success"></span> ONLINE
                </p>
            </div>
        </div>

        <!-- MESSAGES AREA -->
        <div id="messagesContainer" class="flex-1 p-4 overflow-y-auto space-y-4 bg-dark/90">
            <!-- Messages will be added here dynamically -->
        </div>

        <!-- INPUT AREA -->
        <div class="p-4 bg-dark border-t border-secondary/50 flex gap-2 items-center">
            <input 
                id="userInput" 
                type="text" 
                placeholder="Type your command..." 
                class="flex-1 py-3 px-5 rounded-full bg-secondary/70 border border-secondary text-light text-base outline-none focus:border-primary transition-all"
            >
            <button 
                id="sendBtn" 
                class="w-12 h-12 rounded-full bg-primary text-white text-xl font-bold flex items-center justify-center hover:bg-primary/90 active:scale-90 transition-all"
            >
                ➤
            </button>
        </div>
    </div>

        const chatScreen = document.getElementById('chatScreen');
        const loginBtn = document.getElementById('loginBtn');
        const accessKey = document.getElementById('accessKey');
        const statusMsg = document.getElementById('statusMsg');
        const messagesContainer = document.getElementById('messagesContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        loginBtn.addEventListener('click', () => {
            loginBtn.classList.remove('shake');
            void loginBtn.offsetWidth;
            loginBtn.classList.add('shake');

            setTimeout(() => {
                const enteredKey = accessKey.value.trim();
                if (enteredKey === CORRECT_KEY) {
                    statusMsg.textContent = "✅ Login Success";
                    statusMsg.classList.remove('text-danger');
                    statusMsg.classList.add('text-success');

                    setTimeout(() => {
                        loginScreen.classList.add('hidden');
                        chatScreen.classList.remove('hidden');

                    }, 1000);
                } else {
                    statusMsg.textContent = "❌ Wrong Key 🔐";
                    statusMsg.classList.remove('text-success');
                    statusMsg.classList.add('text-danger');
                }
            }, 500);
        });

        accessKey.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

                    ${text}
                </div>

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
